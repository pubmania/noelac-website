<footer class="flex flex-col items-center justify-between py-10 border-t border-neutral-200 dark:border-neutral-800">
  <div class="flex flex-col items-center gap-6">
    <!-- Footer Social Icons (CMS Managed) -->
    <div class="flex flex-wrap justify-center gap-6">
      {{ range .Site.Params.social }}
        <a href="{{ .link | safeURL }}" 
           target="_blank" 
           rel="noopener noreferrer" 
           class="group flex items-center justify-center"
           title="{{ .name | humanize }}">
          <div class="text-neutral-500 hover:text-primary-600 dark:text-neutral-400 dark:hover:text-primary-500 transition-all duration-300 transform hover:scale-125 w-6 h-6">
            {{ partial "icon.html" .icon }}
          </div>
        </a>
      {{ end }}
    </div>

    <!-- Copyright Information -->
    <div class="text-sm text-neutral-500 dark:text-neutral-400">
      &copy; {{ now.Year }} North of England Lhasa Apso Club (NOELAC). All rights reserved.
    </div>
  </div>

  <!-- Go to top button -->
  <div class="mt-8">
    <button id="back-to-top" class="p-3 rounded-full bg-neutral-100 dark:bg-neutral-800 text-neutral-500 hover:bg-primary-600 hover:text-white transition-all shadow-sm" title="Back to top">
       {{ partial "icon.html" "arrow-up" }}
    </button>
  </div>
</footer>

<script>
  // Simple Back to Top logic
  document.getElementById('back-to-top').onclick = function() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };
</script>
