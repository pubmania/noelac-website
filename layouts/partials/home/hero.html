  {{- $imagePath := .Params.homepageImage | default .Site.Params.homepage.homepageImage -}}
  {{- $heroImage := resources.Get $imagePath -}}
  <div class="flex flex-col items-center justify-center min-h-[60vh] text-center px-6 py-12 rounded-3xl overflow-hidden relative shadow-2xl">
    
    <!-- Background Image -->
    <img src="{{ if $heroImage }}{{ $heroImage.RelPermalink }}{{ else }}{{ $imagePath | relURL }}{{ end }}" 
         alt="" 
         class="absolute inset-0 w-full h-full object-cover"
         style="z-index: 0; pointer-events: none;"
         fetchpriority="high"
         loading="eager" />
         
    <!-- Gradient Overlay -->
    <div class="absolute inset-0 w-full h-full" 
         style="background-image: linear-gradient(rgba(38, 20, 2, 0.8), rgba(38, 20, 2, 0.7)); z-index: 1; pointer-events: none;"></div>
    
    <!-- Title & Content -->
    <div class="relative z-10 animate-fade-in-up">
      <h1 class="text-4xl md:text-7xl font-black text-white mb-6 tracking-tight drop-shadow-md">
        {{ .Site.Title }}
      </h1>
      <div class="prose prose-invert lg:prose-xl max-w-2xl mx-auto mb-10 text-white/90 font-medium">
        {{ .Content }}
      </div>
      

      <div class="flex justify-center flex-wrap gap-8 mt-12 pt-8" style="border-top: 1px solid rgba(255, 255, 255, 0.3) !important;">
        {{ range .Site.Params.social }}
          <a href="{{ .link | safeURL }}" 
             target="_blank" 
             rel="noopener noreferrer" 
             class="group flex items-center justify-center p-2 rounded-full hover:bg-white/10 transition-all duration-300"
             title="{{ .name | humanize }}">
            <div class="text-white group-hover:text-primary-500 transition-all duration-300 transform group-hover:scale-125 w-7 h-7">
              {{ partial "icon.html" .icon }}
            </div>
          </a>
        {{ end }}
      </div>
    </div>
  </div>
</section>

<style>
@keyframes fade-in-up {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.animate-fade-in-up {
  animation: fade-in-up 0.8s ease-out forwards;
}
</style>
