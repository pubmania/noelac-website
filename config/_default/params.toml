colorScheme = "noelac"
logo = "logo.png"
secondaryLogo = "logo.png"
disableTextInHeader = true

[homepage]
layout = "hero"
homepageImage = "hero-winner.jpg"
showRecentPosts = true

[header]
layout = "fixed"
showLogo = true
showTitle = false

[footer]
showThemeAttribution = false
showSocial = true
calendar_provider = "google"
calendar_id = ""
calendar_view = "dayGridMonth"
show_calendar = true

[article]
showTableOfContents = false
smartTOC = true
showDate = false
showDateUpdated = false
showWordCount = false
showReadingTime = false
showAuthor = false
showTags = false

[search]
showExcerpt = true
showSubTitle = true
showResultCount = true
showClearButton = true

[[social]]
name = "facebook"
icon = "facebook"
link = "https://www.facebook.com/lhasaclub"

[[social]]
name = "instagram"
icon = "instagram"
link = "https://instagram.com/noelac"

[[social]]
name = "bluesky"
icon = "bluesky"
link = "https://bsky.app"

[[social]]
name = "youtube"
icon = "youtube"
link = "https://youtube.com"

[calendar_config]
calendar_provider = "google"
calendar_view = "listMonth"
show_calendar = true
calendar_id = "en.uk#holiday@group.v.calendar.google.com"
