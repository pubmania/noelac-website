roles:
  - official_role: Digital & Special Projects
    fun_role: Signal Sentinel
    mission: Ensuring the pack's bark is heard clearly across the digital hills.
  - official_role: President
    fun_role: Grand Sentinel
    mission: The ultimate guardian of the breed's legacy.
  - official_role: Secretary
    fun_role: Chief Howler
    mission: Ensures every message and bark is heard.
  - official_role: Treasurer
    fun_role: The Bone Collector
    mission: Managing the "stash" to ensure a prosperous future.
  - official_role: Committee Member
    fun_role: Watchdog
    mission: The eyes and ears of the club, always looking out for the breed.
  - official_role: Chairperson
    fun_role: Pack Leader
    mission: Keeping the hounds in check & ruling the monastery.
  - official_role: Financial Administration
    fun_role: Stash Steward
    mission: Maintaining a tidy ledger to ensure there are always enough treats for the pack.
  - official_role: Media & Communications
    fun_role: The Echo Scout
    mission: Catching the pack's barl and making sure it echoes across every valley and digital peak.
  - official_role: Partnership & Outreach
    fun_role: Bounty Hunter
    mission: Sourcing the finest sponsorship and spoils to support the club's events.
  - official_role: Breed Awareness Liaison
    fun_role: The Wisdom Keeper
    mission: Guarding the ancient truths of the breed and ensuring no one mistakes a "Bark Lion" for a common rug.
