backend:
  name: github
  repo: pubmania/noelac-website
  branch: main
  base_url: https://black-mud-f151.mr-ankitmittal.workers.dev

site_url: https://noelac-website.pages.dev
display_url: https://noelac-website.pages.dev
logo_url: /logo.png
  
local_backend: true
publish_mode: simple #editorial_workflow
editor:
  preview: false
media_folder: "static/uploads"
public_folder: "/uploads"

collections:
  - name: "breeders"
    label: "Breeders"
    folder: "content/community/breeders"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Kennel Name (Affix)", name: "title", widget: "string"}
      - {label: "Date Listed / Updated", name: "date", widget: "datetime"}
      - {label: "Type", name: "type", widget: "hidden", default: "breeders"}
      - {label: "Owner Name", name: "owner", widget: "string"}
      - {label: "Location", name: "location", widget: "string"}
      - {label: "Email", name: "email", widget: "string", required: false}
      - {label: "Phone", name: "phone", widget: "string", required: false}
      - {label: "Puppies Available?", name: "puppies_available", widget: "boolean", default: false, required: false}
      - label: "Number of Puppies"
        name: "puppies_count"
        widget: "number"
        required: false
        min: 1
        value_type: "int"
        hint: "Leave blank if no puppies are available."
      - {label: "Additional Notes", name: "body", widget: "markdown", required: false}
      - {label: "Display Order", name: "weight", widget: "number", default: 10, hint: "Lower numbers appear first."}
  - name: "news"
    label: "News"
    folder: "content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Body", name: "body", widget: "markdown"}
      - {label: "Display Order", name: "weight", widget: "number", default: 10, hint: "Lower numbers appear first."}
  - name: "gallery_albums"
    label: "Gallery Albums"
    folder: "content/gallery"
    path: "{{slug}}/index"
    preview_path: "gallery/{{slug}}"
    create: true
    slug: "{{slug}}"
    editor:
      preview: false
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Cover Image", name: "featureImage", widget: "image", required: false, hint: "Choose the main photo to display on the gallery overview page."}
      - {label: "Cloudinary Tag", name: "cloudinary_tag", widget: "string", required: false, hint: "Tag used for Cloudinary images (e.g. noelac-heritage)."}
      - {label: "Description/Text", name: "body", widget: "markdown", required: false}
      - {label: "Display Order", name: "weight", widget: "number", default: 10, hint: "Lower numbers appear first."}

  - name: "pages"
    label: "Main Pages"
    files:
      - name: "home"
        label: "Home Page"
        file: "content/_index.md"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Layout", name: "layout", widget: "hidden", default: "hero"}
          - {label: "URL (Should be /)", name: "url", widget: "string", default: "/"}
          - {label: "Body", name: "body", widget: "markdown"}

      - name: "calendar"
        label: "Calendar Page"
        file: "content/calendar/index.md"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Body", name: "body", widget: "markdown"}

      - name: "judges"
        label: "Judges (Education)"
        file: "content/education/index.md"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Body", name: "body", widget: "markdown"}

      - name: "lounge_intro"
        label: "Member's Lounge Hub"
        file: "content/community/lounge/_index.md"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Introduction", name: "body", widget: "markdown"}

  - name: "club_info"
    label: "Club Information"
    folder: "content/club-info"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Type", name: "type", widget: "hidden", default: "page"}
      - {label: "Body", name: "body", widget: "markdown"}
      - {label: "Display Order", name: "weight", widget: "number", default: 10, hint: "Lower numbers appear first."}

  - name: "breed"
    label: "The Breed"
    folder: "content/breed"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Type", name: "type", widget: "hidden", default: "page"}
      - {label: "Body", name: "body", widget: "markdown"}
      - {label: "Display Order", name: "weight", widget: "number", default: 10, hint: "Lower numbers appear first."}

  - name: "community_pages"
    label: "Community Pages"
    folder: "content/community"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Type", name: "type", widget: "hidden", default: "page"}
      - {label: "Body", name: "body", widget: "markdown"}
      - {label: "Display Order", name: "weight", widget: "number", default: 10, hint: "Lower numbers appear first."}

  - name: "committee"
    label: "Committee Members"
    folder: "content/committee"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} - {{role}}"
    fields:
      - {label: "Full Name", name: "title", widget: "string"}
      - label: "Category"
        name: "category"
        widget: "select"
        options: 
          - {label: "High Council (Top Officers)", value: "high_council"}
          - {label: "The Outpost Sentinels (Specialist Roles)", value: "outpost"}
          - {label: "The Watchdogs (General Committee)", value: "watchdog"}
        default: "watchdog"
      - label: "Official Role & Fun Title"
        name: "designation"
        widget: "relation"
        collection: "settings"
        file: "designations"
        search_fields: ["roles.*.official_role", "roles.*.fun_role"]
        value_field: "roles.*.official_role"
        display_fields: ["roles.*.official_role", "roles.*.fun_role"]
        hint: "Select the designation mapping."
      - {label: "Profile Photo", name: "image", widget: "image", required: false}
      - {label: "Bio / Description (Optional)", name: "body", widget: "markdown", required: false}
      - {label: "Display Order", name: "weight", widget: "number", default: 10, hint: "Lower numbers appear first."}

  - name: "settings"
    label: "Global Settings"
    delete: false
    editor:
      preview: false
    files:
      - label: "Global Settings & Calendar"
        name: "global_settings"
        file: "config/_default/params.toml"
        fields:
          - label: "Social Media Channels"
            name: "social"
            widget: "list"
            summary: "{{name}}"
            fields:
              - {label: "Platform Name", name: "name", widget: "string", hint: "e.g. Facebook"}
              - {label: "Icon Key", name: "icon", widget: "string", hint: "e.g. facebook"}
              - {label: "URL", name: "link", widget: "string"}

          - label: "Universal Events Calendar"
            name: "calendar_config"
            widget: "object"
            fields:
              - label: "Calendar Provider"
                name: "calendar_provider"
                widget: "select"
                options: ["google", "outlook", "apple", "custom"]
                default: "google"
              - label: "Public Calendar URL / ID"
                name: "calendar_id"
                widget: "string"
                hint: "For Google: your email. For Apple/Outlook: the public .ics link."
              - label: "Default View Style"
                name: "calendar_view"
                widget: "select"
                options: [{label: "Month Grid", value: "dayGridMonth"}, {label: "Agenda List", value: "listMonth"}]
                default: "dayGridMonth"
              - label: "Display Calendar on Website?"
                name: "show_calendar"
                widget: "boolean"
                default: true

      - label: "Committee Designations"
        name: "designations"
        file: "data/designations.yml"
        fields:
          - label: "Roles Mapping"
            name: "roles"
            widget: "list"
            summary: "{{official_role}} ({{fun_role}})"
            fields:
              - {label: "Official Role", name: "official_role", widget: "string"}
              - {label: "Fun Title", name: "fun_role", widget: "string"}
              - {label: "Mission Statement", name: "mission", widget: "string"}

  - name: "lounge"
    label: "The Lounge (Posts)"
    folder: "content/community/lounge"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Content", name: "body", widget: "markdown"}
      - {label: "Display Order", name: "weight", widget: "number", default: 10, hint: "Lower numbers appear first."}

